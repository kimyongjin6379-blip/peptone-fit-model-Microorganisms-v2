# Railway uses Nixpacks for auto-build
# HMMER: KofamScan HMM search engine
# Ruby: KofamScan exec_annotation script
[phases.setup]
nixPkgs = ["hmmer", "ruby", "wget", "gzip"]

[phases.install]
cmds = [
    "pip install -r requirements.txt && pip install -e .",
    "chmod +x scripts/setup_kofamscan.sh start.sh",
]

[start]
cmd = "bash start.sh"
